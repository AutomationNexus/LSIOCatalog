# The FULL LinuxServer.io image fleet the generator converts into the `lsio` catalog.
# Sourced from the official LSIO images API (https://api.linuxserver.io/api/v1/images),
# the canonical fleet list — each entry maps to github.com/linuxserver/docker-<name>
# whose readme-vars.yml is the generator input.
#
# Apps whose readme-vars use semantics CS cannot faithfully represent (host networking,
# privileged, device passthrough, added capabilities, ambiguous/absent primary port,
# path traversal, or that fail CS render validation) are rejected automatically and
# recorded in the generated catalog/rejected.json — every rejection carries a reason.
