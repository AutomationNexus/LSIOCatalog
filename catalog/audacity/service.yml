display_name: Audacity
subdomain: audacity
routing: traefik
auto_update_default: true
containers:
  audacity:
    image_url: lscr.io/linuxserver/audacity
    image_tag: latest
    ports:
    - 3000:3000
    - 3001:3001
    volumes:
    - ${CONFIG_ROOT}/Audacity/config:/config
    service_port: '3000'
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
variants_supported:
- web
- websecure
- wildcard
