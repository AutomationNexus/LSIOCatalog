display_name: Babybuddy
subdomain: babybuddy
routing: traefik
auto_update_default: true
containers:
  babybuddy:
    image_url: lscr.io/linuxserver/babybuddy
    image_tag: latest
    ports:
    - 8000:8000
    volumes:
    - ${CONFIG_ROOT}/Babybuddy/config:/config
    service_port: '8000'
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      CSRF_TRUSTED_ORIGINS: http://127.0.0.1:8000,https://babybuddy.domain.com
variants_supported:
- web
- websecure
- wildcard
