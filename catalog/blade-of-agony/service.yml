display_name: Blade-of-agony
subdomain: blade-of-agony
routing: traefik
auto_update_default: true
containers:
  blade-of-agony:
    image_url: lscr.io/linuxserver/blade-of-agony
    image_tag: latest
    ports:
    - 3000:3000
    - 3001:3001
    volumes:
    - ${CONFIG_ROOT}/Blade-of-agony/config:/config
    service_port: '3000'
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
variants_supported:
- web
- websecure
- wildcard
