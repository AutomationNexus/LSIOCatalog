display_name: Brave
subdomain: brave
routing: traefik
auto_update_default: true
containers:
  brave:
    image_url: lscr.io/linuxserver/brave
    image_tag: latest
    ports:
    - 3000:3000
    - 3001:3001
    volumes:
    - ${CONFIG_ROOT}/Brave/config:/config
    service_port: '3000'
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
variants_supported:
- web
- websecure
- wildcard
