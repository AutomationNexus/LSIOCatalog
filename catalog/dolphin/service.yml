display_name: Dolphin
subdomain: dolphin
routing: traefik
auto_update_default: true
containers:
  dolphin:
    image_url: lscr.io/linuxserver/dolphin
    image_tag: latest
    ports:
    - 3000:3000
    - 3001:3001
    volumes:
    - ${CONFIG_ROOT}/Dolphin/config:/config
    service_port: '3000'
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
variants_supported:
- web
- websecure
- wildcard
