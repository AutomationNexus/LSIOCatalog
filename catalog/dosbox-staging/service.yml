display_name: Dosbox-staging
subdomain: dosbox-staging
routing: traefik
auto_update_default: true
containers:
  dosbox-staging:
    image_url: lscr.io/linuxserver/dosbox-staging
    image_tag: latest
    ports:
    - 3000:3000
    - 3001:3001
    volumes:
    - ${CONFIG_ROOT}/Dosbox-staging/config:/config
    service_port: '3000'
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
variants_supported:
- web
- websecure
- wildcard
