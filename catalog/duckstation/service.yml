display_name: Duckstation
subdomain: duckstation
routing: traefik
auto_update_default: true
containers:
  duckstation:
    image_url: lscr.io/linuxserver/duckstation
    image_tag: latest
    ports:
    - 3000:3000
    - 3001:3001
    volumes:
    - ${CONFIG_ROOT}/Duckstation/config:/config
    service_port: '3000'
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
variants_supported:
- web
- websecure
- wildcard
