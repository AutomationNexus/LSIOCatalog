display_name: Eden
subdomain: eden
routing: traefik
auto_update_default: true
containers:
  eden:
    image_url: lscr.io/linuxserver/eden
    image_tag: latest
    ports:
    - 3000:3000
    - 3001:3001
    volumes:
    - ${CONFIG_ROOT}/Eden/config:/config
    service_port: '3000'
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
variants_supported:
- web
- websecure
- wildcard
