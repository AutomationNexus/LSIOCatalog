display_name: Ferdium
subdomain: ferdium
routing: traefik
auto_update_default: true
containers:
  ferdium:
    image_url: lscr.io/linuxserver/ferdium
    image_tag: latest
    ports:
    - 3000:3000
    - 3001:3001
    volumes:
    - ${CONFIG_ROOT}/Ferdium/config:/config
    service_port: '3000'
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
variants_supported:
- web
- websecure
- wildcard
