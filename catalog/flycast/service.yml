display_name: Flycast
subdomain: flycast
routing: traefik
auto_update_default: true
containers:
  flycast:
    image_url: lscr.io/linuxserver/flycast
    image_tag: latest
    ports:
    - 3000:3000
    - 3001:3001
    volumes:
    - ${CONFIG_ROOT}/Flycast/config:/config
    service_port: '3000'
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
variants_supported:
- web
- websecure
- wildcard
