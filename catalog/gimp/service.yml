display_name: Gimp
subdomain: gimp
routing: traefik
auto_update_default: true
containers:
  gimp:
    image_url: lscr.io/linuxserver/gimp
    image_tag: latest
    ports:
    - 3000:3000
    - 3001:3001
    volumes:
    - ${CONFIG_ROOT}/Gimp/config:/config
    service_port: '3000'
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
variants_supported:
- web
- websecure
- wildcard
