display_name: Grav
subdomain: grav
routing: traefik
auto_update_default: true
containers:
  grav:
    image_url: lscr.io/linuxserver/grav
    image_tag: latest
    ports:
    - 80:80
    volumes:
    - ${CONFIG_ROOT}/Grav/config:/config
    service_port: '80'
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
variants_supported:
- web
- websecure
- wildcard
