display_name: Heimdall
subdomain: heimdall
routing: traefik
auto_update_default: true
containers:
  heimdall:
    image_url: lscr.io/linuxserver/heimdall
    image_tag: latest
    ports:
    - 80:80
    - 443:443
    volumes:
    - ${CONFIG_ROOT}/Heimdall/config:/config
    service_port: '80'
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
variants_supported:
- web
- websecure
- wildcard
