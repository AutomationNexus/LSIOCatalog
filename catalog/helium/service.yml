display_name: Helium
subdomain: helium
routing: traefik
auto_update_default: true
containers:
  helium:
    image_url: lscr.io/linuxserver/helium
    image_tag: latest
    ports:
    - 3000:3000
    - 3001:3001
    volumes:
    - ${CONFIG_ROOT}/Helium/config:/config
    service_port: '3000'
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
variants_supported:
- web
- websecure
- wildcard
