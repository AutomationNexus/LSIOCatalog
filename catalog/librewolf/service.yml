display_name: Librewolf
subdomain: librewolf
routing: traefik
auto_update_default: true
containers:
  librewolf:
    image_url: lscr.io/linuxserver/librewolf
    image_tag: latest
    ports:
    - 3000:3000
    - 3001:3001
    volumes:
    - ${CONFIG_ROOT}/Librewolf/config:/config
    service_port: '3000'
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
variants_supported:
- web
- websecure
- wildcard
