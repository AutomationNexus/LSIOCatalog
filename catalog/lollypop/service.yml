display_name: Lollypop
subdomain: lollypop
routing: traefik
auto_update_default: true
containers:
  lollypop:
    image_url: lscr.io/linuxserver/lollypop
    image_tag: latest
    ports:
    - 3000:3000
    - 3001:3001
    volumes:
    - ${CONFIG_ROOT}/Lollypop/config:/config
    service_port: '3000'
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
variants_supported:
- web
- websecure
- wildcard
