display_name: Onlyoffice
subdomain: onlyoffice
routing: traefik
auto_update_default: true
containers:
  onlyoffice:
    image_url: lscr.io/linuxserver/onlyoffice
    image_tag: latest
    ports:
    - 3000:3000
    - 3001:3001
    volumes:
    - ${CONFIG_ROOT}/Onlyoffice/config:/config
    service_port: '3000'
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
variants_supported:
- web
- websecure
- wildcard
