display_name: Openshot
subdomain: openshot
routing: traefik
auto_update_default: true
containers:
  openshot:
    image_url: lscr.io/linuxserver/openshot
    image_tag: latest
    ports:
    - 3000:3000
    - 3001:3001
    volumes:
    - ${CONFIG_ROOT}/Openshot/config:/config
    service_port: '3000'
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
variants_supported:
- web
- websecure
- wildcard
