display_name: Piwigo
subdomain: piwigo
routing: traefik
auto_update_default: true
containers:
  piwigo:
    image_url: lscr.io/linuxserver/piwigo
    image_tag: latest
    ports:
    - 80:80
    volumes:
    - ${CONFIG_ROOT}/Piwigo/config:/config
    - ${STORAGE_ROOT}/gallery:/gallery
    service_port: '80'
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
variants_supported:
- web
- websecure
- wildcard
