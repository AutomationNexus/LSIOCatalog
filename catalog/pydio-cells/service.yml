display_name: Pydio-cells
subdomain: pydio-cells
routing: traefik
auto_update_default: true
containers:
  pydio-cells:
    image_url: lscr.io/linuxserver/pydio-cells
    image_tag: latest
    ports:
    - 8080:8080
    volumes:
    - ${CONFIG_ROOT}/Pydio-cells/config:/config
    service_port: '8080'
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      EXTERNALURL: yourdomain.url
variants_supported:
- web
- websecure
- wildcard
