display_name: Qbittorrent
subdomain: qbittorrent
routing: traefik
auto_update_default: true
containers:
  qbittorrent:
    image_url: lscr.io/linuxserver/qbittorrent
    image_tag: latest
    ports:
    - 8080:8080
    - 6881:6881
    volumes:
    - ${CONFIG_ROOT}/Qbittorrent/config:/config
    - ${STORAGE_ROOT}/downloads:/downloads
    service_port: '8080'
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      WEBUI_PORT: '8080'
      TORRENTING_PORT: '6881'
variants_supported:
- web
- websecure
- wildcard
