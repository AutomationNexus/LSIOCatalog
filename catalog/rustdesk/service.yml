display_name: Rustdesk
subdomain: rustdesk
routing: traefik
auto_update_default: true
containers:
  rustdesk:
    image_url: lscr.io/linuxserver/rustdesk
    image_tag: latest
    ports:
    - 3000:3000
    - 3001:3001
    volumes:
    - ${CONFIG_ROOT}/Rustdesk/config:/config
    service_port: '3000'
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
variants_supported:
- web
- websecure
- wildcard
