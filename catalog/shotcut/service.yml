display_name: Shotcut
subdomain: shotcut
routing: traefik
auto_update_default: true
containers:
  shotcut:
    image_url: lscr.io/linuxserver/shotcut
    image_tag: latest
    ports:
    - 3000:3000
    - 3001:3001
    volumes:
    - ${CONFIG_ROOT}/Shotcut/config:/config
    service_port: '3000'
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
variants_supported:
- web
- websecure
- wildcard
