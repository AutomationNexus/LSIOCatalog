display_name: Signal
subdomain: signal
routing: traefik
auto_update_default: true
containers:
  signal:
    image_url: lscr.io/linuxserver/signal
    image_tag: latest
    ports:
    - 3000:3000
    - 3001:3001
    volumes:
    - ${CONFIG_ROOT}/Signal/config:/config
    service_port: '3000'
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
variants_supported:
- web
- websecure
- wildcard
