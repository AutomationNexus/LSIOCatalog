display_name: Smokeping
subdomain: smokeping
routing: traefik
auto_update_default: true
containers:
  smokeping:
    image_url: lscr.io/linuxserver/smokeping
    image_tag: latest
    ports:
    - 80:80
    volumes:
    - ${CONFIG_ROOT}/Smokeping/config:/config
    - ${STORAGE_ROOT}/data:/data
    service_port: '80'
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
variants_supported:
- web
- websecure
- wildcard
