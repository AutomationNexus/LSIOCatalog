display_name: Speedtest-tracker
subdomain: speedtest-tracker
routing: traefik
auto_update_default: true
containers:
  speedtest-tracker:
    image_url: lscr.io/linuxserver/speedtest-tracker
    image_tag: latest
    ports:
    - 80:80
    volumes:
    - ${CONFIG_ROOT}/Speedtest-tracker/config:/config
    service_port: '80'
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      DB_CONNECTION: sqlite
variants_supported:
- web
- websecure
- wildcard
