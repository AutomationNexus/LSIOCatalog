display_name: Telegram
subdomain: telegram
routing: traefik
auto_update_default: true
containers:
  telegram:
    image_url: lscr.io/linuxserver/telegram
    image_tag: latest
    ports:
    - 3000:3000
    - 3001:3001
    volumes:
    - ${CONFIG_ROOT}/Telegram/config:/config
    service_port: '3000'
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
variants_supported:
- web
- websecure
- wildcard
