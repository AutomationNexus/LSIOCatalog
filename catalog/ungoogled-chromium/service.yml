display_name: Ungoogled-chromium
subdomain: ungoogled-chromium
routing: traefik
auto_update_default: true
containers:
  ungoogled-chromium:
    image_url: lscr.io/linuxserver/ungoogled-chromium
    image_tag: latest
    ports:
    - 3000:3000
    - 3001:3001
    volumes:
    - ${CONFIG_ROOT}/Ungoogled-chromium/config:/config
    service_port: '3000'
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
variants_supported:
- web
- websecure
- wildcard
