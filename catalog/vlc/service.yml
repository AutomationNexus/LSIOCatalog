display_name: Vlc
subdomain: vlc
routing: traefik
auto_update_default: true
containers:
  vlc:
    image_url: lscr.io/linuxserver/vlc
    image_tag: latest
    ports:
    - 3000:3000
    - 3001:3001
    volumes:
    - ${CONFIG_ROOT}/Vlc/config:/config
    service_port: '3000'
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
variants_supported:
- web
- websecure
- wildcard
