display_name: Webtop
subdomain: webtop
routing: traefik
auto_update_default: true
containers:
  webtop:
    image_url: lscr.io/linuxserver/webtop
    image_tag: latest
    ports:
    - 3000:3000
    - 3001:3001
    volumes:
    - ${CONFIG_ROOT}/Webtop/config:/config
    service_port: '3000'
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
variants_supported:
- web
- websecure
- wildcard
