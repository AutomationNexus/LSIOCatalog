display_name: Zotero
subdomain: zotero
routing: traefik
auto_update_default: true
containers:
  zotero:
    image_url: lscr.io/linuxserver/zotero
    image_tag: latest
    ports:
    - 3000:3000
    - 3001:3001
    volumes:
    - ${CONFIG_ROOT}/Zotero/config:/config
    service_port: '3000'
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
variants_supported:
- web
- websecure
- wildcard
