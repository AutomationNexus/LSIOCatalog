display_name: Freshrss
subdomain: freshrss
routing: traefik
auto_update_default: true
containers:
  freshrss:
    image_url: lscr.io/linuxserver/freshrss
    image_tag: latest
    ports:
    - 80:80
    volumes:
    - ${CONFIG_ROOT}/Freshrss/config:/config
    service_port: '80'
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
variants_supported:
- web
- websecure
- wildcard
