display_name: Handbrake
subdomain: handbrake
routing: traefik
auto_update_default: true
containers:
  handbrake:
    image_url: lscr.io/linuxserver/handbrake
    image_tag: latest
    ports:
    - 3000:3000
    - 3001:3001
    volumes:
    - ${CONFIG_ROOT}/Handbrake/config:/config
    service_port: '3000'
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
variants_supported:
- web
- websecure
- wildcard
