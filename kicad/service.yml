display_name: Kicad
subdomain: kicad
routing: traefik
auto_update_default: true
containers:
  kicad:
    image_url: lscr.io/linuxserver/kicad
    image_tag: latest
    ports:
    - 3000:3000
    - 3001:3001
    volumes:
    - ${CONFIG_ROOT}/Kicad/config:/config
    service_port: '3000'
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
variants_supported:
- web
- websecure
- wildcard
