display_name: Krita
subdomain: krita
routing: traefik
auto_update_default: true
containers:
  krita:
    image_url: lscr.io/linuxserver/krita
    image_tag: latest
    ports:
    - 3000:3000
    - 3001:3001
    volumes:
    - ${CONFIG_ROOT}/Krita/config:/config
    service_port: '3000'
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
variants_supported:
- web
- websecure
- wildcard
