display_name: Mediaelch
subdomain: mediaelch
routing: traefik
auto_update_default: true
containers:
  mediaelch:
    image_url: lscr.io/linuxserver/mediaelch
    image_tag: latest
    ports:
    - 3000:3000
    - 3001:3001
    volumes:
    - ${CONFIG_ROOT}/Mediaelch/config:/config
    service_port: '3000'
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
variants_supported:
- web
- websecure
- wildcard
