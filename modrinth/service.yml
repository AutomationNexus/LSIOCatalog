display_name: Modrinth
subdomain: modrinth
routing: traefik
auto_update_default: true
containers:
  modrinth:
    image_url: lscr.io/linuxserver/modrinth
    image_tag: latest
    ports:
    - 3000:3000
    - 3001:3001
    volumes:
    - ${CONFIG_ROOT}/Modrinth/config:/config
    service_port: '3000'
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
variants_supported:
- web
- websecure
- wildcard
