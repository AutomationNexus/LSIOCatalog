display_name: Ombi
subdomain: ombi
routing: traefik
auto_update_default: true
containers:
  ombi:
    image_url: lscr.io/linuxserver/ombi
    image_tag: latest
    ports:
    - 3579:3579
    volumes:
    - ${CONFIG_ROOT}/Ombi/config:/config
    service_port: '3579'
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
variants_supported:
- web
- websecure
- wildcard
