display_name: Phpmyadmin
subdomain: phpmyadmin
routing: traefik
auto_update_default: true
containers:
  phpmyadmin:
    image_url: lscr.io/linuxserver/phpmyadmin
    image_tag: latest
    ports:
    - 80:80
    volumes:
    - ${CONFIG_ROOT}/Phpmyadmin/config:/config
    service_port: '80'
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
variants_supported:
- web
- websecure
- wildcard
