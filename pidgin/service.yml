display_name: Pidgin
subdomain: pidgin
routing: traefik
auto_update_default: true
containers:
  pidgin:
    image_url: lscr.io/linuxserver/pidgin
    image_tag: latest
    ports:
    - 3000:3000
    - 3001:3001
    volumes:
    - ${CONFIG_ROOT}/Pidgin/config:/config
    service_port: '3000'
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
variants_supported:
- web
- websecure
- wildcard
